<!DOCTYPE html><html><head><meta charset="utf-8"><style>
:root{--blue:#4262ff;--blue-bg:#eef1ff;--ink:#15151e;--mut:#69697f;--bd:#e4e4ee;--bg:#f7f7fb;--grn:#11845b;--grnbg:#e8f6f0;--amb:#b45309;--ambbg:#fef3e2}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:var(--ink);background:#fff;display:flex;flex-direction:column;height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
.hd{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--bd);flex-shrink:0}
.hd .ttl{font-size:15px;font-weight:600}
.hd .sub{font-size:12px;color:var(--mut);margin-top:1px}
.appic{width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back{width:28px;height:28px;border-radius:8px;border:1px solid var(--bd);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--mut);flex-shrink:0}
.x{margin-left:auto;width:28px;height:28px;border-radius:8px;border:none;background:none;color:var(--mut);font-size:18px;display:flex;align-items:center;justify-content:center}
.bodyc{flex:1;overflow:auto;padding:20px}
.card{border:1px solid var(--bd);border-radius:14px;padding:16px;background:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;padding:10px 18px;font-family:inherit}
.btn-p{background:var(--blue);color:#fff;box-shadow:0 1px 2px rgba(66,98,255,.35)}
.btn-s{background:#fff;color:var(--ink);border:1px solid var(--bd)}
.btn-g{background:none;color:var(--mut);font-weight:500}
.btn-full{width:100%}
.lbl{font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.sel{width:100%;appearance:none;border:1px solid var(--bd);border-radius:8px;padding:9px 30px 9px 12px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff}
.selwrap{position:relative}
.selwrap::after{content:'';position:absolute;right:13px;top:50%;width:7px;height:7px;border-right:1.8px solid var(--mut);border-bottom:1.8px solid var(--mut);transform:translateY(-70%) rotate(45deg);pointer-events:none}
.inp{width:100%;border:1px solid var(--bd);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--ink)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;border-radius:999px;padding:4px 10px}
.pill-g{background:var(--grnbg);color:var(--grn)}
.pill-b{background:var(--blue-bg);color:var(--blue)}
.dotlive{width:7px;height:7px;border-radius:50%;background:var(--grn)}
.ft{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--bd);flex-shrink:0;background:#fff}
.steps{display:flex;align-items:flex-start;padding:16px 24px 4px;flex-shrink:0}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;width:64px}
.dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg);color:var(--mut);border:1.5px solid var(--bd)}
.step.done .dot{background:var(--blue);border-color:var(--blue);color:#fff}
.step.act .dot{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.step .lb{font-size:10.5px;color:var(--mut)}
.step.act .lb{color:var(--blue);font-weight:600}
.sbar{height:2px;flex:1;background:var(--bd);margin-top:11px}
.sbar.done{background:var(--blue)}
.sw{width:34px;height:20px;border-radius:999px;background:#d6d6e2;position:relative;flex-shrink:0}
.sw.on{background:var(--blue)}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.sw.on::after{left:auto;right:2px}
.row{display:flex;align-items:center;gap:10px}
.minicard{border:1px solid var(--bd);border-left:5px solid var(--blue);border-radius:8px;padding:10px 12px;background:#fff;box-shadow:0 1px 3px rgba(9,9,40,.08)}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.on{background:var(--blue);border-color:var(--blue);color:#fff;font-size:11px;font-weight:700}
</style></head><body>
<div class="hd" style="border-bottom:none;padding-bottom:0"><div class="ttl" style="font-size:16px">Create org chart</div><button class="x">&#10005;</button></div>
<div class="steps"><div class="step act"><div class="dot">1</div><div class="lb">Layout</div></div><div class="sbar "></div><div class="step "><div class="dot">2</div><div class="lb">Upload</div></div><div class="sbar "></div><div class="step "><div class="dot">3</div><div class="lb">Map</div></div><div class="sbar "></div><div class="step "><div class="dot">4</div><div class="lb">Fields</div></div></div>
<div class="bodyc" style="padding-top:14px">
  <div style="font-size:15px;font-weight:600;margin-bottom:4px">How should your chart grow?</div>
  <div style="font-size:12.5px;color:var(--mut);margin-bottom:16px">You can rearrange cards on the board anytime.</div>
  <div class="row" style="gap:14px;align-items:stretch">
    <div class="card" style="flex:1;text-align:center;border:2px solid var(--blue);background:var(--blue-bg);position:relative;padding:18px 12px 14px">
      <div style="position:absolute;top:10px;right:10px" class="chk on">&#10003;</div>
      <svg width="92" height="66" viewBox="0 0 100 72"><g stroke="#7d8fe8" stroke-width="1.3" fill="none"><path d="M50 12v6M26 18h48M26 18v6M74 18v6"/><path d="M26 34v6M13 40h26M13 40v6M39 40v6"/><path d="M74 34v6M61 40h26M61 40v6M87 40v6"/></g><g fill="#7d8fe8"><rect x="42" y="2" width="16" height="10" rx="2"/><rect x="18" y="24" width="16" height="10" rx="2"/><rect x="66" y="24" width="16" height="10" rx="2"/><rect x="6" y="46" width="14" height="10" rx="2"/><rect x="32" y="46" width="14" height="10" rx="2"/><rect x="54" y="46" width="14" height="10" rx="2"/><rect x="80" y="46" width="14" height="10" rx="2"/></g></svg>
      <div style="font-weight:600;font-size:13.5px;margin-top:8px">Vertical</div>
      <div style="font-size:11.5px;color:var(--mut);margin-top:2px">Top-down, classic org chart</div>
    </div>
    <div class="card" style="flex:1;text-align:center;position:relative;padding:18px 12px 14px">
      <div style="position:absolute;top:10px;right:10px" class="chk"></div>
      <svg width="92" height="66" viewBox="0 0 100 72"><g stroke="#b4b7e8" stroke-width="1.3" fill="none"><path d="M20 36h5M25 19v34M25 19h5M25 53h5"/><path d="M48 19h7M55 9v20M55 9h7M55 29h7"/><path d="M48 53h7M55 43v20M55 43h7M55 63h7"/></g><g fill="#b4b7e8"><rect x="2" y="31" width="18" height="10" rx="2"/><rect x="30" y="14" width="18" height="10" rx="2"/><rect x="30" y="48" width="18" height="10" rx="2"/><rect x="62" y="4" width="16" height="10" rx="2"/><rect x="62" y="24" width="16" height="10" rx="2"/><rect x="62" y="38" width="16" height="10" rx="2"/><rect x="62" y="58" width="16" height="10" rx="2"/></g></svg>
      <div style="font-weight:600;font-size:13.5px;margin-top:8px">Horizontal</div>
      <div style="font-size:11.5px;color:var(--mut);margin-top:2px">Left-to-right, deep teams</div>
    </div>
  </div>
</div>
<div class="ft"><button class="btn btn-g">Cancel</button><button class="btn btn-p">Continue</button></div>
</body></html>
