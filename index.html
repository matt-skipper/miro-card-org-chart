<!DOCTYPE html>
<html lang="en">
  <!--
    Local dev landing page (npm start → http://localhost:3009/ — see vite.config.js).
    Explains how to create a Miro Developer team and links to app.html for panel preview.
    The board-side panel is app.html (opened from the app icon via src/index.js).
  -->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/assets/style.css" />
    <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <title>Miro Card Org Chart</title>
  </head>
  <body>
    <div id="root" aria-hidden="true">
      <div class="grid container">
        <div class="cs1 ce12">
          <img src="/src/assets/welcome.png" alt="" />
        </div>
        <div class="cs1 ce12">
          <p style="font-size: large">Great, your app is running locally</p>
          <p>
            You can now create your Developer team to get your app running in
            Miro.
          </p>
        </div>
        <div class="cs1 ce12">
          <a
            class="button button-primary"
            href="https://developers.miro.com/docs/create-a-developer-team"
            target="_blank"
          >
            Create a Developer team
          </a>
        </div>
        <div class="cs1 ce12">
          <p>To see your app, open it in a app panel on Miro.com, or preview it at <a href="/app.html" class="link link-primary">this url</a></p>
        </div>
      </div>
    </div>
    <!-- Registers Miro icon click → open app.html panel -->
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
